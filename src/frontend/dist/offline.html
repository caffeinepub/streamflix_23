<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamFlix - You're Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #141414;
      color: #ffffff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 900;
      color: #e50914;
      letter-spacing: -1px;
      margin-bottom: 48px;
    }
    .icon {
      font-size: 5rem;
      margin-bottom: 24px;
      opacity: 0.7;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      font-size: 1rem;
      color: #aaaaaa;
      max-width: 360px;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .retry-btn {
      background-color: #e50914;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .retry-btn:hover {
      background-color: #f40612;
    }
    .retry-btn:active {
      background-color: #b20710;
    }
  </style>
</head>
<body>
  <div class="logo">STREAMFLIX</div>
  <div class="icon">📡</div>
  <h1>You're Offline</h1>
  <p>Looks like you've lost your internet connection. Check your network and try again.</p>
  <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
</body>
</html>
